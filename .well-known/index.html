<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HonestStitch - Travel Planning App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #002060 0%, #FF6B35 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 0.3em;
        }
        .subtitle {
            font-size: 1.3em;
            margin-bottom: 1em;
            opacity: 0.9;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 2em;
        }
        .download-button {
            background: white;
            color: #002060;
            padding: 15px 40px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .download-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        .features {
            margin-top: 3em;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5em;
        }
        .feature {
            padding: 1em;
        }
        .feature-icon {
            font-size: 2em;
            margin-bottom: 0.5em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗺️ HonestStitch</h1>
        <div class="subtitle">Travel Smarter Together</div>
        <p>Plan your perfect trip with community-curated itineraries. Discover hidden gems, share your adventures, and travel like a local.</p>
        <a href="#" class="download-button">Coming Soon to the App Store</a>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">📍</div>
                <div>Discover Places</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🗓️</div>
                <div>Plan Itineraries</div>
            </div>
            <div class="feature">
                <div class="feature-icon">👥</div>
                <div>Share Adventures</div>
            </div>
        </div>
    </div>
</body>
</html>
